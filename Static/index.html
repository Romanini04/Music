<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MúsicaApp</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --surface: #161616; --card: #1e1e1e;
  --hover: #272727; --border: #2a2a2a; --text: #f0f0f0;
  --muted: #888; --accent: #ff3d3d; --glow: rgba(255,61,61,0.2);
  --player-h: 160px;
}
.light {
  --bg: #f4f4f4; --surface: #fff; --card: #ebebeb;
  --hover: #e0e0e0; --border: #d0d0d0; --text: #111;
  --muted: #666; --accent: #e00; --glow: rgba(220,0,0,0.12);
}
body {
  font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
  display: flex; flex-direction: column; min-height: 100vh;
  padding-bottom: var(--player-h); transition: background .3s, color .3s; overflow-x: hidden;
}
.header {
  position: sticky; top: 0; z-index: 100; background: var(--bg);
  border-bottom: 1px solid var(--border); padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
}
.logo { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.logo-mark {
  width: 34px; height: 34px; border-radius: 10px; background: var(--accent);
  display: flex; align-items: center; justify-content: center; box-shadow: 0 0 14px var(--glow);
}
.logo-name { font-size: 17px; font-weight: 900; letter-spacing: -.5px; }
.logo-name span { color: var(--accent); }
.search-box {
  flex: 1; display: flex; align-items: center; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: 50px; overflow: hidden; transition: border-color .2s;
}
.search-box:focus-within { border-color: var(--accent); }
.search-inp {
  flex: 1; background: none; border: none; outline: none;
  padding: 9px 14px; font-size: 14px; color: var(--text); font-family: 'Nunito', sans-serif;
}
.search-inp::placeholder { color: var(--muted); }
.search-go { background: var(--accent); border: none; cursor: pointer; padding: 9px 14px; color: #fff; display: flex; align-items: center; }
.icon-btn {
  background: none; border: 1px solid var(--border); border-radius: 50%;
  width: 36px; height: 36px; cursor: pointer; color: var(--text); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: background .2s;
}
.icon-btn:hover { background: var(--hover); }
.status-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 6px 14px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted);
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: #888; flex-shrink: 0; transition: background .3s; }
.dot.ok { background: #4caf50; } .dot.err { background: var(--accent); }
.dot.spin { animation: blink 1s infinite; } @keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }
.main { flex: 1; padding: 0 14px 20px; }
.sec-title { font-size: 15px; font-weight: 700; margin: 18px 0 10px; }
.grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
@media(min-width:480px){ .grid { grid-template-columns: repeat(3,1fr); } }
.card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform .18s; }
.card:active { transform: scale(.97); }
.card.active { outline: 2px solid var(--accent); box-shadow: 0 0 14px var(--glow); }
.thumb { position: relative; aspect-ratio: 16/9; background: #111; overflow: hidden; }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-over { position: absolute; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; }
.card:hover .thumb-over, .card.active .thumb-over { opacity: 1; }
.play-circle { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; }
.dur-badge { position: absolute; bottom: 4px; right: 5px; background: rgba(0,0,0,.75); color: #fff; font-family: 'DM Mono',monospace; font-size: 10px; padding: 1px 5px; border-radius: 4px; }
.card-body { padding: 8px 10px 10px; }
.card-title { font-size: 12px; font-weight: 700; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-ch { font-size: 11px; color: var(--muted); margin-top: 3px; }
.card.active .card-title { color: var(--accent); }
.queue-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; cursor: pointer; transition: background .15s; }
.queue-item:hover { background: var(--hover); } .queue-item.active { background: rgba(255,61,61,.1); }
.q-thumb { width: 52px; height: 30px; border-radius: 5px; object-fit: cover; background: #111; flex-shrink: 0; }
.q-info { flex: 1; min-width: 0; }
.q-title { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.queue-item.active .q-title { color: var(--accent); }
.q-ch { font-size: 11px; color: var(--muted); }
.q-del { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 5px; flex-shrink: 0; opacity: 0; transition: opacity .2s; }
.queue-item:hover .q-del { opacity: 1; } .q-del:hover { color: var(--accent); }
.loading-wrap, .empty-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--muted); font-size: 14px; text-align: center; }
.spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.player { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); z-index: 200; box-shadow: 0 -6px 30px rgba(0,0,0,.4); }
audio { display: none; }
.p-top { display: flex; align-items: center; gap: 10px; padding: 10px 14px 4px; }
.p-thumb { width: 46px; height: 46px; border-radius: 8px; object-fit: cover; background: #111; flex-shrink: 0; }
.p-info { flex: 1; min-width: 0; }
.p-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-ch { font-size: 11px; color: var(--muted); margin-top: 2px; }
.p-ctrls { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.c-btn { background: none; border: none; cursor: pointer; color: var(--muted); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: color .2s, background .2s; }
.c-btn:hover { color: var(--text); background: var(--hover); }
.c-btn.main { width: 42px; height: 42px; background: var(--accent); color: #fff !important; }
.p-prog { padding: 2px 14px 0; }
.prog-track { height: 3px; background: var(--border); border-radius: 2px; cursor: pointer; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width .4s linear; }
.p-times { display: flex; justify-content: space-between; font-family: 'DM Mono',monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }
.p-vol { display: flex; align-items: center; gap: 8px; padding: 4px 14px 10px; }
.p-vol button { background: none; border: none; color: var(--muted); cursor: pointer; flex-shrink: 0; }
input[type=range].vol { flex: 1; -webkit-appearance: none; height: 3px; border-radius: 2px; background: var(--border); outline: none; cursor: pointer; }
input[type=range].vol::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--accent); cursor: pointer; }
svg { display: block; }

/* API URL config */
.config-banner {
  background: linear-gradient(135deg,#1a0a0a,#1a1a0a);
  border: 1px solid rgba(255,61,61,.2); border-radius: 12px;
  margin: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px;
}
.config-banner h3 { font-size: 13px; color: var(--accent); }
.config-row { display: flex; gap: 8px; }
.config-inp {
  flex: 1; background: #0f0f0f; border: 1px solid #333; border-radius: 8px;
  padding: 9px 12px; color: var(--text); font-size: 12px; font-family: monospace; outline: none;
}
.config-inp:focus { border-color: var(--accent); }
.config-btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 9px 16px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.config-note { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
    </div>
    <span class="logo-name">Música<span>App</span></span>
  </div>
  <div class="search-box">
    <input class="search-inp" id="q" type="search" placeholder="Buscar canción, artista..." autocomplete="off" enterkeyhint="search">
    <button class="search-go" id="searchBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>
  <button class="icon-btn" id="themeBtn">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" id="themeIco">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</div>

<div class="status-bar">
  <div class="dot spin" id="dot"></div>
  <span id="statusLbl">Conectando al servidor...</span>
</div>

<!-- Backend URL config -->
<div class="config-banner" id="configBanner" style="display:none">
  <h3>🔧 Ingresa la URL de tu servidor Render</h3>
  <div class="config-row">
    <input class="config-inp" id="backendUrl" placeholder="https://tu-app.onrender.com" type="url">
    <button class="config-btn" id="saveUrl">Guardar</button>
  </div>
  <p class="config-note">La URL la encuentras en tu dashboard de Render después de hacer deploy.</p>
</div>

<div class="main">
  <div id="content">
    <div class="empty-wrap">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="currentColor" style="opacity:.3">
        <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
      </svg>
      <p>Busca cualquier canción o artista<br>y empieza a escuchar 🎵</p>
    </div>
  </div>
  <div id="queueWrap" style="display:none">
    <div class="sec-title">Cola de reproducción</div>
    <div id="queueList"></div>
  </div>
</div>

<div class="player" id="player" style="display:none">
  <audio id="audio" preload="none"></audio>
  <div class="p-top">
    <img class="p-thumb" id="pThumb" src="" alt="">
    <div class="p-info">
      <div class="p-title" id="pTitle">—</div>
      <div class="p-ch" id="pCh">—</div>
    </div>
    <div class="p-ctrls">
      <button class="c-btn" id="btnPrev">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
      <button class="c-btn main" id="btnPlay">
        <svg id="playIco" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </button>
      <button class="c-btn" id="btnNext">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="p-prog">
    <div class="prog-track" id="progTrack"><div class="prog-fill" id="progFill"></div></div>
    <div class="p-times"><span id="tEl">0:00</span><span id="tDur">0:00</span></div>
  </div>
  <div class="p-vol">
    <button id="muteBtn">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
    </button>
    <input type="range" class="vol" id="vol" min="0" max="100" value="90">
  </div>
</div>

<script>
// ── Backend URL ───────────────────────────────────────────────────────
let BASE = localStorage.getItem('musicapp_backend') || '';

function setStatus(state, msg) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('statusLbl').textContent = msg;
}

async function checkBackend() {
  if (!BASE) {
    setStatus('err', 'Configura la URL del servidor ↓');
    document.getElementById('configBanner').style.display = 'flex';
    document.getElementById('configBanner').style.flexDirection = 'column';
    return false;
  }
  try {
    const r = await fetch(`${BASE}/search?q=test`, { signal: AbortSignal.timeout(10000) });
    if (r.ok) { setStatus('ok', 'Servidor conectado ✓'); return true; }
  } catch {}
  setStatus('err', 'No se pudo conectar al servidor');
  document.getElementById('configBanner').style.display = 'flex';
  document.getElementById('configBanner').style.flexDirection = 'column';
  return false;
}

document.getElementById('saveUrl').onclick = async () => {
  let url = document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;
  BASE = url;
  localStorage.setItem('musicapp_backend', BASE);
  document.getElementById('configBanner').style.display = 'none';
  setStatus('spin', 'Verificando servidor...');
  await checkBackend();
};

checkBackend();

// ── Search ────────────────────────────────────────────────────────────
let queue = [], curIdx = -1, isPlaying = false, progInterval = null;
const audio = document.getElementById('audio');

document.getElementById('searchBtn').onclick = doSearch;
document.getElementById('q').onkeydown = e => { if (e.key === 'Enter') doSearch(); };

async function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  if (!BASE) { document.getElementById('configBanner').style.display='flex'; return; }
  showLoading();
  try {
    const r = await fetch(`${BASE}/search?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    if (data.error) { showEmpty('Error: ' + data.error); return; }
    if (!data.items || !data.items.length) { showEmpty('Sin resultados.'); return; }
    renderResults(data.items);
  } catch(e) {
    showEmpty('Error de conexión con el servidor.');
  }
}

function showLoading() {
  document.getElementById('content').innerHTML = `<div class="loading-wrap"><div class="spinner"></div><span>Buscando...</span></div>`;
}
function showEmpty(msg) {
  document.getElementById('content').innerHTML = `<div class="empty-wrap"><p>${msg}</p></div>`;
}

function renderResults(items) {
  const c = document.getElementById('content');
  c.innerHTML = `<div class="sec-title">Resultados</div><div class="grid" id="grid"></div>`;
  const grid = document.getElementById('grid');
  items.slice(0,20).forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    const dur = item.duration > 0 ? fmt(item.duration) : '';
    card.innerHTML = `
      <div class="thumb">
        <img src="${item.thumb}" loading="lazy" alt="">
        <div class="thumb-over"><div class="play-circle">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div></div>
        ${dur ? `<span class="dur-badge">${dur}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${item.title}</div>
        <div class="card-ch">${item.channel}</div>
      </div>`;
    card.onclick = () => {
      const exists = queue.findIndex(x => x.id === item.id);
      if (exists >= 0) playIdx(exists);
      else { queue.push(item); renderQueue(); playIdx(queue.length-1); }
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
    };
    grid.appendChild(card);
  });
}

function renderQueue() {
  const wrap = document.getElementById('queueWrap');
  const list = document.getElementById('queueList');
  if (!queue.length) { wrap.style.display='none'; return; }
  wrap.style.display='block'; list.innerHTML='';
  queue.forEach((item,i) => {
    const div = document.createElement('div');
    div.className = 'queue-item'+(i===curIdx?' active':'');
    div.innerHTML = `
      <img class="q-thumb" src="${item.thumb}" alt="">
      <div class="q-info"><div class="q-title">${item.title}</div><div class="q-ch">${item.channel}</div></div>
      <button class="q-del"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg></button>`;
    div.onclick = e => { if(!e.target.closest('.q-del')) playIdx(i); };
    div.querySelector('.q-del').onclick = e => { e.stopPropagation(); queue.splice(i,1); if(curIdx>=queue.length) curIdx=queue.length-1; renderQueue(); };
    list.appendChild(div);
  });
}

async function playIdx(idx) {
  if (idx < 0 || idx >= queue.length) return;
  curIdx = idx;
  const item = queue[idx];
  document.getElementById('player').style.display='block';
  document.getElementById('pThumb').src = item.thumb;
  document.getElementById('pTitle').textContent = item.title;
  document.getElementById('pCh').textContent = item.channel;
  document.getElementById('progFill').style.width='0%';
  document.getElementById('tEl').textContent='0:00';
  document.getElementById('tDur').textContent='0:00';
  renderQueue();
  setPlayIco('loading');
  stopProgress();
  audio.pause(); audio.src='';

  // Stream directly from our backend — no CORS issues!
  audio.src = `${BASE}/stream/${item.id}`;
  audio.volume = document.getElementById('vol').value / 100;
  try {
    await audio.play();
  } catch(e) {
    toast('⚠️ Error cargando. Siguiente...');
    setTimeout(() => nextTrack(), 1200);
  }
}

function nextTrack() { if(curIdx<queue.length-1) playIdx(curIdx+1); else { isPlaying=false; setPlayIco('play'); } }
function prevTrack() { if(audio.currentTime>3){audio.currentTime=0;return;} if(curIdx>0) playIdx(curIdx-1); }

audio.onended = () => { stopProgress(); nextTrack(); };
audio.onerror = () => { toast('Error de audio'); setTimeout(nextTrack,800); };
audio.onplay = () => { isPlaying=true; setPlayIco('pause'); startProgress(); };
audio.onpause = () => { isPlaying=false; setPlayIco('play'); };

document.getElementById('btnPlay').onclick = () => { if(!audio.src) return; isPlaying?audio.pause():audio.play(); };
document.getElementById('btnNext').onclick = nextTrack;
document.getElementById('btnPrev').onclick = prevTrack;
document.getElementById('vol').oninput = e => { audio.volume=e.target.value/100; };
document.getElementById('muteBtn').onclick = () => { audio.muted=!audio.muted; };
document.getElementById('progTrack').onclick = e => {
  if(!audio.duration) return;
  const r=e.currentTarget.getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
};

function startProgress() {
  stopProgress();
  progInterval = setInterval(()=>{
    if(!audio.duration) return;
    document.getElementById('progFill').style.width=(audio.currentTime/audio.duration*100)+'%';
    document.getElementById('tEl').textContent=fmt(audio.currentTime);
    document.getElementById('tDur').textContent=fmt(audio.duration);
  },500);
}
function stopProgress() { if(progInterval){clearInterval(progInterval);progInterval=null;} }

function fmt(s) {
  if(!s||isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
}
function setPlayIco(state) {
  const ico=document.getElementById('playIco');
  if(state==='pause') ico.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  else if(state==='loading') ico.innerHTML='<circle cx="12" cy="12" r="8" fill="none" stroke="white" stroke-width="2.5" stroke-dasharray="30 10"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur=".7s" repeatCount="indefinite"/></circle>';
  else ico.innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
}
function toast(msg) {
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:170px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:999;white-space:nowrap;font-family:Nunito,sans-serif;transition:opacity .3s;';
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2500);
}

let dark=true;
document.getElementById('themeBtn').onclick=()=>{
  dark=!dark; document.body.classList.toggle('light',!dark);
  document.getElementById('themeIco').innerHTML=dark
    ?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    :'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
};
</script>
</body>
</html>
